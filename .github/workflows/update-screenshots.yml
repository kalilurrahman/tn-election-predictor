name: Update Screenshots

on:
  push:
    branches: [master, main]
    paths:
      - 'tn-predictor-final/src/**'
      - 'tn-predictor-final/public/**'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  update-screenshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'tn-predictor-final/package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: tn-predictor-final
        run: |
          npm install
          npx playwright install --with-deps
          pip install -r backend/requirements.txt
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Build frontend
        working-directory: tn-predictor-final
        run: npm run build

      - name: Start backend server
        working-directory: tn-predictor-final
        run: |
          python -m uvicorn backend.main:app --port 7860 &
          sleep 5

      - name: Capture screenshots
        working-directory: tn-predictor-final
        run: npx playwright test scripts/capture_screenshots.ts

      - name: Generate GIF
        working-directory: tn-predictor-final
        run: |
          cd docs/screenshots
          convert -delay 150 -loop 0 dashboard.png candidate-registry.png strategy-lab.png polls.png statistics.png demo.gif

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update screenshots and demo gif"
          file_pattern: "tn-predictor-final/docs/screenshots/*.png tn-predictor-final/docs/screenshots/demo.gif"
